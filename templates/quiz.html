<section class="section page-enter">
    <div class="section-header">
        <span class="prompt">lizard@web:~$</span>
        <span class="cmd">./quiz</span>
        <span class="flag">--decrypt</span>
        <span class="comment"># enter passphrase</span>
    </div>

    <!-- Decrypt screen -->
    <div id="quiz-decrypt">
        <div class="quiz-card">
            <div class="quiz-card-title">🔐 Quiz</div>
            <div class="quiz-card-sub">Enter the passphrase to decrypt and start.</div>
            <div class="quiz-input-row">
                <label for="quiz-passphrase" class="quiz-label">passphrase:</label>
                <input id="quiz-passphrase" type="password" class="quiz-input" placeholder="enter passphrase..." autocomplete="off" />
            </div>
            <button id="quiz-decrypt-btn" class="quiz-btn" onclick="quizDecrypt()">decrypt &amp; start</button>
            <div id="quiz-error" class="quiz-error"></div>
        </div>
    </div>

    <!-- Mode select -->
    <div id="quiz-mode" style="display:none">
        <div class="quiz-card">
            <div class="quiz-card-title">Select Mode</div>
            <div class="quiz-mode-stats" id="quiz-mode-stats"></div>
            <div class="quiz-mode-grid">
                <button class="quiz-mode-btn" onclick="quizStart('all')">
                    <span class="quiz-mode-btn-title">all</span>
                    <span class="quiz-mode-btn-desc">every question, sequential</span>
                </button>
                <button class="quiz-mode-btn" onclick="quizStart('random30')">
                    <span class="quiz-mode-btn-title">random 30</span>
                    <span class="quiz-mode-btn-desc">30 random questions</span>
                </button>
                <button class="quiz-mode-btn" onclick="quizStart('unseen')">
                    <span class="quiz-mode-btn-title">unseen</span>
                    <span class="quiz-mode-btn-desc">skip known questions</span>
                </button>
                <button class="quiz-mode-btn" onclick="quizStart('review')">
                    <span class="quiz-mode-btn-title">review known</span>
                    <span class="quiz-mode-btn-desc">practice marked questions</span>
                </button>
            </div>
            <div class="quiz-mode-footer">
                <button id="quiz-mark-all-btn" class="quiz-btn quiz-btn-small" onclick="quizMarkAllKnown()">✓ mark all as known</button>
                <button class="quiz-btn quiz-btn-small quiz-btn-danger" onclick="quizResetKnown()">✗ reset known</button>
            </div>
        </div>
    </div>

    <!-- Quiz screen -->
    <div id="quiz-screen" style="display:none">
        <div class="quiz-card">
            <div class="quiz-progress">
                <span id="quiz-counter"></span>
                <div class="quiz-progress-bar"><div id="quiz-progress-fill" class="quiz-progress-fill"></div></div>
                <span id="quiz-score"></span>
            </div>
            <div id="quiz-q-num" class="quiz-q-num"></div>
            <div id="quiz-question" class="quiz-question"></div>
            <div id="quiz-options" class="quiz-options"></div>
            <div id="quiz-submit-area" class="quiz-submit-area">
                <button id="quiz-submit-btn" class="quiz-btn" onclick="quizSubmit()" disabled>submit answer</button>
            </div>
            <div id="quiz-skip-area" class="quiz-skip-area">
                <button id="quiz-skip-btn" class="quiz-btn quiz-btn-small quiz-btn-skip" onclick="quizSkipAndMark()">skip + mark known</button>
            </div>
            <div id="quiz-feedback" style="display:none">
                <div id="quiz-result-icon" class="quiz-result-icon"></div>
                <div id="quiz-result-text" class="quiz-result-text"></div>
                <div id="quiz-explanation" class="quiz-explanation"></div>
                <div class="quiz-actions">
                    <button id="quiz-mark-known" class="quiz-btn quiz-btn-small quiz-btn-known" onclick="quizMarkKnown()">✓ mark as known</button>
                    <button id="quiz-next-btn" class="quiz-btn quiz-btn-small" onclick="quizNext()">next →</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Summary screen -->
    <div id="quiz-summary" style="display:none">
        <div class="quiz-card quiz-summary-card">
            <div class="quiz-card-title">Quiz Complete</div>
            <div id="quiz-summary-stats" class="quiz-summary-stats"></div>
            <div class="quiz-summary-actions">
                <button class="quiz-btn" onclick="quizBackToMode()">← change mode</button>
                <button class="quiz-btn quiz-btn-alt" onclick="quizRestart()">restart</button>
            </div>
        </div>
    </div>
</section>

<script>
var QUIZ_KEY = 'known_questions_v1';

var quizData = null;
var quizFiltered = null;
var quizCurrent = 0;
var quizCorrect = 0;
var quizWrong = 0;
var quizMode = 'unseen';
var quizUserAnswer = '';
var quizShowResult = false;
var quizKnown = [];

/* ── Persistence ── */
function loadKnown() {
    try {
        var stored = localStorage.getItem(QUIZ_KEY);
        if (stored) quizKnown = JSON.parse(stored);
    } catch(e) {}
    if (!Array.isArray(quizKnown)) quizKnown = [];
}
function saveKnown() {
    localStorage.setItem(QUIZ_KEY, JSON.stringify(quizKnown));
}
loadKnown();

/* ── Decrypt ── */
function quizDecrypt() {
    var passphrase = document.getElementById('quiz-passphrase').value;
    if (!passphrase) {
        document.getElementById('quiz-error').textContent = '✗ enter a passphrase';
        return;
    }
    var errorEl = document.getElementById('quiz-error');
    var btn = document.getElementById('quiz-decrypt-btn');
    errorEl.textContent = '';
    btn.textContent = 'decrypting...';
    btn.disabled = true;

    fetch('questions.enc')
        .then(function(r) {
            if (!r.ok) throw new Error('Could not load questions file');
            return r.arrayBuffer();
        })
        .then(function(buf) {
            var bytes = new Uint8Array(buf);
            var salt = bytes.slice(0, 16);
            var iv = bytes.slice(16, 32);
            var ciphertext = bytes.slice(32);
            return crypto.subtle.importKey(
                'raw', new TextEncoder().encode(passphrase), { name: 'PBKDF2' }, false, ['deriveKey']
            ).then(function(keyMaterial) {
                return crypto.subtle.deriveKey(
                    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-1' },
                    keyMaterial,
                    { name: 'AES-CBC', length: 256 },
                    false,
                    ['decrypt']
                );
            }).then(function(aesKey) {
                return crypto.subtle.decrypt({ name: 'AES-CBC', iv: iv }, aesKey, ciphertext);
            });
        })
        .then(function(plaintext) {
            var jsonStr = new TextDecoder().decode(plaintext);
            quizData = JSON.parse(jsonStr);
            loadKnown();
            document.getElementById('quiz-decrypt').style.display = 'none';
            document.getElementById('quiz-mode').style.display = '';
            quizUpdateModeStats();
        })
        .catch(function() {
            errorEl.textContent = '✗ wrong passphrase or corrupted file';
            btn.textContent = 'decrypt & start';
            btn.disabled = false;
        });
}

/* ── Mode stats ── */
function quizUpdateModeStats() {
    var total = quizData.length;
    var known = quizKnown.length;
    var unseen = total - known;
    document.getElementById('quiz-mode-stats').innerHTML =
        '<span class="quiz-stat-pill">' + total + ' total</span>' +
        '<span class="quiz-stat-pill quiz-stat-pill-green">' + unseen + ' unseen</span>' +
        '<span class="quiz-stat-pill quiz-stat-pill-yellow">' + known + ' known</span>';
    var markAllBtn = document.getElementById('quiz-mark-all-btn');
    if (markAllBtn) markAllBtn.style.display = unseen > 0 ? '' : 'none';
}

/* ── Shuffle ── */
function shuffleArray(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
}

/* ── Start quiz ── */
function quizStart(mode) {
    quizMode = mode;
    var filtered = [];
    if (mode === 'all') {
        filtered = quizData.slice();
    } else if (mode === 'random30') {
        filtered = shuffleArray(quizData.slice()).slice(0, 30);
    } else if (mode === 'unseen') {
        filtered = quizData.filter(function(q) { return quizKnown.indexOf(q.question_number) === -1; });
    } else if (mode === 'review') {
        filtered = quizData.filter(function(q) { return quizKnown.indexOf(q.question_number) !== -1; });
    }

    if (filtered.length === 0) {
        document.getElementById('quiz-mode').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('quiz-summary').style.display = '';
        quizShowEmpty();
        return;
    }

    quizFiltered = filtered;
    quizCurrent = 0;
    quizCorrect = 0;
    quizWrong = 0;
    document.getElementById('quiz-mode').style.display = 'none';
    document.getElementById('quiz-screen').style.display = '';
    document.getElementById('quiz-summary').style.display = 'none';
    quizRenderQuestion();
}

/* ── Render question ── */
function quizRenderQuestion() {
    var q = quizFiltered[quizCurrent];
    quizUserAnswer = '';
    quizShowResult = false;

    var total = quizFiltered.length;
    var pct = Math.round((quizCurrent / total) * 100);

    document.getElementById('quiz-counter').textContent = 'question ' + (quizCurrent + 1) + '/' + total;
    document.getElementById('quiz-progress-fill').style.width = pct + '%';
    document.getElementById('quiz-score').textContent = '✓' + quizCorrect + ' ✗' + quizWrong;
    document.getElementById('quiz-q-num').textContent = 'Q' + q.question_number;
    document.getElementById('quiz-question').textContent = q.question;

    var optsEl = document.getElementById('quiz-options');
    optsEl.innerHTML = '';
    var keys = Object.keys(q.answers).sort();
    for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        var div = document.createElement('div');
        div.className = 'quiz-option';
        div.id = 'opt-' + k;
        div.innerHTML = '<span class="quiz-opt-key">' + k + '</span><span class="quiz-opt-val">' + q.answers[k] + '</span>';
        div.addEventListener('click', (function(key) { return function() { quizSelect(key); }; })(k));
        optsEl.appendChild(div);
    }

    document.getElementById('quiz-submit-btn').disabled = true;
    document.getElementById('quiz-submit-btn').textContent = 'submit answer';
    document.getElementById('quiz-submit-area').style.display = '';
    document.getElementById('quiz-skip-area').style.display = '';
    document.getElementById('quiz-feedback').style.display = 'none';
}

/* ── Select answer ── */
function quizSelect(k) {
    if (quizShowResult) return;
    quizUserAnswer = k;
    var opts = document.querySelectorAll('.quiz-option');
    for (var i = 0; i < opts.length; i++) opts[i].classList.remove('quiz-option-selected');
    document.getElementById('opt-' + k).classList.add('quiz-option-selected');
    document.getElementById('quiz-submit-btn').disabled = false;
}

/* ── Submit ── */
function quizSubmit() {
    if (!quizUserAnswer || quizShowResult) return;
    quizSubmitInternal(quizUserAnswer, false);
}

/* ── Skip + mark ── */
function quizSkipAndMark() {
    if (quizShowResult) return;
    var q = quizFiltered[quizCurrent];
    quizSubmitInternal(null, true);
    if (quizKnown.indexOf(q.question_number) === -1) {
        quizKnown.push(q.question_number);
        saveKnown();
    }
    quizUpdateMarkButton(q.question_number);
}

/* ── Internal submit ── */
function quizSubmitInternal(answer, isSkip) {
    quizShowResult = true;
    var q = quizFiltered[quizCurrent];
    var correct = !isSkip && (answer === q.correct_answer);

    var opts = document.querySelectorAll('.quiz-option');
    for (var i = 0; i < opts.length; i++) opts[i].classList.remove('quiz-option-selected');
    document.getElementById('opt-' + q.correct_answer).classList.add('quiz-option-correct');
    if (!correct && !isSkip && answer) {
        var wrongEl = document.getElementById('opt-' + answer);
        if (wrongEl) wrongEl.classList.add('quiz-option-wrong');
    }

    if (correct) {
        quizCorrect++;
        document.getElementById('quiz-result-icon').textContent = '✅';
        document.getElementById('quiz-result-text').textContent = 'correct';
        document.getElementById('quiz-result-text').className = 'quiz-result-text quiz-result-correct';
    } else {
        quizWrong++;
        document.getElementById('quiz-result-icon').textContent = '❌';
        var label = isSkip ? 'skipped — answer: ' + q.correct_answer : 'wrong — answer: ' + q.correct_answer;
        document.getElementById('quiz-result-text').textContent = label;
        document.getElementById('quiz-result-text').className = 'quiz-result-text quiz-result-wrong';
    }

    document.getElementById('quiz-explanation').textContent = q.explanation || '';
    document.getElementById('quiz-feedback').style.display = '';
    document.getElementById('quiz-score').textContent = '✓' + quizCorrect + ' ✗' + quizWrong;
    document.getElementById('quiz-submit-area').style.display = 'none';
    document.getElementById('quiz-skip-area').style.display = 'none';
    quizUpdateMarkButton(q.question_number);
}

/* ── Mark button state ── */
function quizUpdateMarkButton(qNum) {
    var markBtn = document.getElementById('quiz-mark-known');
    if (!markBtn) return;
    if (quizKnown.indexOf(qNum) !== -1) {
        markBtn.textContent = '✓ already known';
        markBtn.disabled = true;
    } else {
        markBtn.textContent = '✓ mark as known';
        markBtn.disabled = false;
    }
}

/* ── Mark + next ── */
function quizMarkKnown() {
    var q = quizFiltered[quizCurrent];
    var qNum = q.question_number;
    if (quizKnown.indexOf(qNum) === -1) {
        quizKnown.push(qNum);
        saveKnown();
    }
    quizNext();
}

/* ── Navigation ── */
function quizNext() {
    quizCurrent++;
    if (quizCurrent < quizFiltered.length) {
        quizRenderQuestion();
    } else {
        quizShowSummary();
    }
}

/* ── Summary ── */
function quizShowSummary() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('quiz-summary').style.display = '';
    var total = quizCorrect + quizWrong;
    var pct = total > 0 ? ((quizCorrect / total) * 100).toFixed(1) : '0.0';
    document.getElementById('quiz-summary-stats').innerHTML =
        '<div class="quiz-stat"><span class="quiz-stat-val quiz-stat-correct">' + quizCorrect + '</span><span class="quiz-stat-label">correct</span></div>' +
        '<div class="quiz-stat"><span class="quiz-stat-val quiz-stat-wrong">' + quizWrong + '</span><span class="quiz-stat-label">wrong</span></div>' +
        '<div class="quiz-stat"><span class="quiz-stat-val">' + pct + '%</span><span class="quiz-stat-label">score</span></div>';
}

/* ── Empty state ── */
function quizShowEmpty() {
    var msg = '';
    if (quizMode === 'unseen') {
        msg = 'All questions marked as known. Switch to "all" or "review known" mode to keep practicing.';
    } else if (quizMode === 'review') {
        msg = 'No questions marked as known yet. Practice some first!';
    } else {
        msg = 'No questions available.';
    }
    document.getElementById('quiz-summary-stats').innerHTML =
        '<div class="quiz-card-sub">' + msg + '</div>';
}

/* ── Back / restart ── */
function quizBackToMode() {
    document.getElementById('quiz-summary').style.display = 'none';
    document.getElementById('quiz-mode').style.display = '';
    quizUpdateModeStats();
}

function quizMarkAllKnown() {
    if (!confirm('Mark ALL ' + quizData.length + ' questions as known?')) return;
    for (var i = 0; i < quizData.length; i++) {
        var qn = quizData[i].question_number;
        if (quizKnown.indexOf(qn) === -1) quizKnown.push(qn);
    }
    saveKnown();
    quizUpdateModeStats();
}

function quizResetKnown() {
    if (!confirm('Reset known questions? This will unmark all ' + quizKnown.length + ' questions.')) return;
    quizKnown = [];
    saveKnown();
    quizUpdateModeStats();
}

function quizRestart() {
    quizData = null;
    quizFiltered = null;
    quizCurrent = 0;
    quizCorrect = 0;
    quizWrong = 0;
    document.getElementById('quiz-passphrase').value = '';
    document.getElementById('quiz-error').textContent = '';
    document.getElementById('quiz-decrypt-btn').textContent = 'decrypt & start';
    document.getElementById('quiz-decrypt-btn').disabled = false;
    document.getElementById('quiz-summary').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('quiz-mode').style.display = 'none';
    document.getElementById('quiz-decrypt').style.display = '';
}

/* ── Enter key ── */
document.getElementById('quiz-passphrase').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') quizDecrypt();
});
</script>
