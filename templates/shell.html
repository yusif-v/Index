<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{PAGE_TITLE}}</title>
        <meta name="description" content="{{META_DESCRIPTION}}" />
        <meta name="author" content="lizard" />
        <meta name="theme-color" content="#0a0e14" />
        <link rel="canonical" href="{{CANONICAL}}" />

        <!-- Open Graph -->
        <meta property="og:title" content="{{OG_TITLE}}" />
        <meta property="og:description" content="{{META_DESCRIPTION}}" />
        <meta property="og:type" content="{{OG_TYPE}}" />
        <meta property="og:url" content="{{CANONICAL}}" />
        <meta property="og:site_name" content="lizard@web" />

        <!-- Twitter -->
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="{{OG_TITLE}}" />
        <meta name="twitter:description" content="{{META_DESCRIPTION}}" />

        <!-- Inline SVG favicon — green prompt glyph on the site bg -->
        <link
            rel="icon"
            type="image/svg+xml"
            href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230a0e14'/%3E%3Ctext x='8' y='44' font-family='monospace' font-size='32' font-weight='700' fill='%2300ff9c'%3E%26gt;_%3C/text%3E%3C/svg%3E"
        />

        <!-- RSS -->
        <link
            rel="alternate"
            type="application/rss+xml"
            title="lizard@web — feed"
            href="{{ROOT}}/feed.xml"
        />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="{{ROOT}}/css/style.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
        />
    </head>
    <body>
        <a class="skip-link" href="#main">skip to content</a>

        <!-- Window Chrome -->
        <div class="window-bar" aria-hidden="true">
            <div class="window-dot dot-red"></div>
            <div class="window-dot dot-yellow"></div>
            <div class="window-dot dot-green"></div>
            <div class="window-title">lizard@web — bash — 80×24</div>
            <div class="window-spacer"></div>
        </div>

        <div class="shell">
            <!-- Nav -->
            <nav class="nav" aria-label="primary">
                <span class="nav-prompt">lizard@web:~$</span>
                <span class="nav-cmd">ls</span>
                <a href="{{ROOT}}/index.html" class="{{NAV_BLOG}}">~/posts</a>
                <span class="nav-sep" aria-hidden="true">|</span>
                <a href="{{ROOT}}/about.html" class="{{NAV_ABOUT}}">~/about</a>
                <span class="nav-sep" aria-hidden="true">|</span>
                <a href="{{ROOT}}/projects.html" class="{{NAV_PROJECTS}}"
                    >~/projects</a
                >
                <span class="nav-sep" aria-hidden="true">|</span>
                <a
                    href="https://github.com/yusif-v"
                    target="_blank"
                    rel="noopener noreferrer"
                    >~/github</a
                >
            </nav>

            <main id="main">{{CONTENT}}</main>

            <!-- Footer -->
            <footer class="footer">
                <div class="footer-links">
                    <a
                        href="https://github.com/yusif-v"
                        target="_blank"
                        rel="noopener noreferrer"
                        >GitHub</a
                    >
                    <a href="{{ROOT}}/about.html">About</a>
                    <a href="{{ROOT}}/feed.xml">RSS</a>
                </div>
                <div>
                    &copy; 2026 lizard &mdash; built with markdown &amp; GitHub
                    Actions
                </div>
                <div class="footer-ascii" aria-hidden="true">EOF</div>
            </footer>
        </div>

        <!-- Status Bar -->
        <div class="status-bar" aria-hidden="true">
            <span
                ><span class="status-mode">NORMAL</span>
                &nbsp;{{STATUS_FILE}}</span
            >
            <span id="status-info">utf-8 | html | 0%</span>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
        <script>
            hljs.highlightAll();

            const statusInfo = document.getElementById("status-info");
            const tocLinks = document.querySelectorAll(".toc-list a");
            const headings = document.querySelectorAll(
                ".post-body h2[id], .post-body h3[id]",
            );

            function updateStatus() {
                const denom = document.body.scrollHeight - window.innerHeight;
                const pct =
                    denom > 0
                        ? Math.round((window.scrollY / denom) * 100)
                        : 100;
                statusInfo.textContent = "utf-8 | html | " + pct + "%";

                if (!tocLinks.length) return;
                let current = "";
                for (const h of headings) {
                    if (h.getBoundingClientRect().top <= 80) current = h.id;
                }
                tocLinks.forEach((a) => {
                    a.classList.toggle(
                        "active",
                        a.getAttribute("href") === "#" + current,
                    );
                });
            }

            updateStatus();
            window.addEventListener("scroll", updateStatus, { passive: true });
            window.addEventListener("resize", updateStatus, { passive: true });
        </script>
    </body>
</html>
