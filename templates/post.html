<section class="section page-enter">
    <a href="{{ROOT}}/index.html" class="back-link">&larr; cd ~/blog</a>
    <div class="section-header">
        <span class="prompt">lizard@web:~$</span>
        <span class="cmd">cat</span>
        <span class="flag">blog/{{SLUG}}.md</span>
    </div>
    <h1 class="post-h1">{{TITLE}}</h1>
    <div class="post-meta" style="margin-bottom: 1rem">
        <span class="post-date">{{DATE}}</span>
        <span class="post-reading">{{READING_TIME}}</span>
        {{TAGS_HTML}}
    </div>
    <div class="post-layout">
        <div class="post-body">{{BODY}}</div>
        {{TOC}}
    </div>
</section>
